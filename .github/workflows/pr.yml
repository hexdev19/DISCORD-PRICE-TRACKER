name: PR

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  python:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: pricetracker_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql+asyncpg://test:test@localhost:5432/pricetracker_test
      APP_ENV: test
      DISCORD_TOKEN: dummy
      DISCORD_CLIENT_ID: dummy
      DISCORD_CLIENT_SECRET: dummy
      SESSION_COOKIE_SECRET: dummy-session-secret-for-tests-32b
      OAUTH_TOKEN_ENC_KEY: dummy-enc-key-for-tests-32-bytes-pad
      REDIS_URL: redis://localhost:6379/0
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,api,bot,workers]"
      - name: Lint
        run: ruff check . && ruff format --check .
      - name: Type check
        run: mypy app
      - name: Forbidden patterns (token / print leak guard)
        run: |
          ! grep -RnE 'logger\.[a-z]+\([^)]*token' app
          ! grep -RnE 'print\s*\(' app
      - name: Migrate
        run: alembic upgrade head && alembic downgrade base && alembic upgrade head
      - name: Unit + integration tests
        run: pytest --cov=app --cov-report=term-missing
